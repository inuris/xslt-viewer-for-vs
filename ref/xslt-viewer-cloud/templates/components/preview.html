<div id="preview-container">
    <div class="right-top">
        <div class="path-info">Preview: <strong>/</strong></div>
        <div class="preview-controls">
            <button id="preview-print" class="icon-btn" title="Print Preview">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                    <path d="M19 8h-1V3H6v5H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zM8 5h8v3H8V5zm8 12v2H8v-4h8v2zm2-2v-2H6v2H4v-4c0-0.55 0.45-1 1-1h14c0.55 0 1 0.45 1 1v4h-2z"/>
                    <circle cx="18" cy="11.5" r="1"/>
                </svg>
            </button>
            <select id="preview-zoom" title="Zoom Level">
                <option value="50">50%</option>
                <option value="75">75%</option>
                <option value="100" selected>100%</option>
                <option value="125">125%</option>
                <option value="150">150%</option>
            </select>
        </div>
    </div>
    
    <div id="image-sidebar" class="preview-sidebar">
        <div class="sidebar-header">
            <span>Images</span>
            <button id="toggle-image-sidebar" class="icon-btn">»</button>
        </div>
        <div id="image-list" class="image-list">
            <!-- Images will be populated here -->
        </div>
    </div>

    <!-- The transformed XML/XSLT result will load in this iframe when a file link is clicked -->
    <iframe id="viewer" name="viewer" class="viewer-frame" title="Preview"></iframe>
</div>
