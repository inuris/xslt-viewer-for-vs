<input type="file" id="zipUploadInput" accept=".zip" style="display: none;">

<!-- Unsaved Changes Modal -->
<div id="unsavedChangesModal" class="modal">
    <div class="modal-content">
        <h3>Do you want to save the changes?</h3>
        <p id="unsavedChangesMessage">You have unsaved changes in this file.</p>
        <div class="modal-actions" style="justify-content: flex-end; gap: 10px;">
            <button id="unsavedSaveBtn" class="btn btn-primary">Save</button>
            <button id="unsavedDontSaveBtn" class="btn btn-danger">Don't Save</button>
            <button id="unsavedCancelBtn" class="btn btn-secondary">Cancel</button>
        </div>
    </div>
</div>

<!-- Zip Extract Modal -->
<div id="zipModal" class="modal">
    <div class="modal-content">
        <h3>Extract Zip File</h3>
        <p>Enter the folder name to extract to:</p>
        <div class="autocomplete-wrapper">
            <input type="text" id="folderNameInput" placeholder="Folder Name" autocomplete="off">
            <ul id="folderSuggestions" class="suggestions-list"></ul>
        </div>
        <div class="modal-actions">
            <button id="zipCancelBtn" class="btn btn-secondary">Cancel</button>
            <button id="zipOkBtn" class="btn btn-primary">Extract</button>
        </div>
    </div>
</div>

<!-- Image Resize Modal -->
<div id="imageResizeModal" class="modal">
    <div class="modal-content" style="width: 500px;">
        <h3>Resize Image</h3>
        <div class="resize-preview-container">
            <img id="resizePreviewImage" src="" alt="Preview" style="max-width: 100%; max-height: 300px; display: block; margin: 0 auto;">
        </div>
        <div class="resize-controls" style="margin-top: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="control-group">
                <label for="resizeWidth">Width (px):</label>
                <input type="number" id="resizeWidth" class="form-control">
            </div>
            <div class="control-group">
                <label for="resizeHeight">Height (px):</label>
                <input type="number" id="resizeHeight" class="form-control">
            </div>
        </div>
        <div class="resize-options" style="margin-top: 10px;">
            <label>
                <input type="checkbox" id="resizeAspectRatio" checked> Maintain Aspect Ratio
            </label>
            <div id="resizeInfo" style="font-size: 0.9em; color: #666; margin-top: 5px;"></div>
        </div>
        <div class="modal-actions">
            <button id="resizeCancelBtn" class="btn btn-secondary">Cancel</button>
            <button id="resizeOkBtn" class="btn btn-primary">Insert</button>
        </div>
    </div>
</div>

<!-- File Conflict Modal -->
<div id="conflictModal" class="modal">
    <div class="modal-content">
        <h3>File Conflict</h3>
        <p id="conflictMessage">The following files already exist:</p>
        <ul id="conflictList" style="max-height: 150px; overflow-y: auto; margin-bottom: 15px; font-size: 0.9em; color: #666; list-style: disc; padding-left: 20px;"></ul>
        <div class="modal-actions">
            <button id="conflictSkipBtn" class="btn btn-secondary">Skip</button>
            <button id="conflictRenameBtn" class="btn btn-secondary">Rename</button>
            <button id="conflictOverwriteBtn" class="btn btn-danger">Overwrite</button>
        </div>
    </div>
</div>
