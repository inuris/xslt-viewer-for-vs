    <ul id="fileList" class="file-list">
        <!-- Content rendered by JS -->
    </ul>
    
    <!-- Empty State -->
    <div id="emptyState" style="display: none; padding: 30px 20px; text-align: center; color: #888; position: absolute; top: 50%; left: 0; right: 0; transform: translateY(-50%);">
        <div style="margin: 0 auto 15px auto; opacity: 0.5; width: 48px;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M11 14.9861C11 15.5384 11.4477 15.9861 12 15.9861C12.5523 15.9861 13 15.5384 13 14.9861V7.82831L16.2428 11.0711L17.657 9.65685L12.0001 4L6.34326 9.65685L7.75748 11.0711L11 7.82854V14.9861Z" fill="currentColor"/>
                <path d="M4 14H6V18H18V14H20V18C20 19.1046 19.1046 20 18 20H6C4.89543 20 4 19.1046 4 18V14Z" fill="currentColor"/>
            </svg>
        </div>
        <h3 style="margin-bottom: 10px; font-size: 1.1em; color: #ccc;">No Files</h3>
        <p style="margin-bottom: 20px; font-size: 0.9em;">
            Upload a Zip or drag & drop files here.
        </p>
        <button id="firstRunStartBtn" class="btn btn-primary" style="width: auto; padding: 6px 12px; font-size: 0.9em;">Upload Zip</button>
    </div>

    <div class="sidebar-footer" style="padding: 10px; border-top: 1px solid #333; text-align: center; margin-top: auto;">
        <div id="vfs-status" style="font-size: 0.8em; color: #888; margin-bottom: 8px; text-align: left;">
            Storage: <span id="vfs-size">0 KB</span>
            <div style="background: #333; height: 4px; border-radius: 2px; margin-top: 4px; overflow: hidden;">
                <div id="vfs-bar" style="background: #2196f3; height: 100%; width: 0%;"></div>
            </div>
        </div>
        <button id="clearCacheBtn" class="btn btn-secondary" style="width: 100%; font-size: 0.8em; background: #333; color: #ccc; border: 1px solid #444;">Clear Cache & Reset</button>
    </div>
</aside>

    <ul>
        <li id="ctx-refresh">Refresh</li>
        <li id="ctx-new-folder">New Folder</li>

        <li id="ctx-open">Open</li>

        <li id="ctx-copy">Copy</li>
        <li id="ctx-cut">Cut</li>

        <li class="separator"></li>
        <li id="ctx-duplicate">Duplicate</li>

    </ul>
</div>
